# firmware-release.yml
#
# Triggered on a release/* tag push (or manually via workflow_dispatch).
#
# What it does:
#   build job  — installs arm-none-eabi-gcc, generates application_config.h
#                from secrets, patches the auto-generated makefile's hardcoded
#                Windows linker-script path, then builds two firmware variants:
#                  slotA.bin  ORIGIN=0x08020000  VECT_TAB_OFFSET=0x00020000
#                  slotB.bin  ORIGIN=0x08040000  VECT_TAB_OFFSET=0x00040000
#                Computes STM32 CRC-32/MPEG-2 for each, uploads both as an artifact.
#
#   deploy job — queries the AWS IoT Thing Shadow to find which slot is currently
#                active, selects the inactive slot's binary, uploads it to S3,
#                creates/replaces the IoT Stream pointing at it, generates the job
#                document, and creates an IoT Job targeting the device.
#
# Required GitHub Secrets:
#   WIFI_SSID             WiFi network name
#   WIFI_PASSWORD         WiFi password
#   MQTT_BROKER           AWS IoT device data endpoint (e.g. xxxx.iot.ap-south-1.amazonaws.com)
#   CLIENT_ID             AWS IoT Thing name
#   UTC_OFFSET            Hours from UTC (integer, e.g. 5 for PKT)
#   MOTION_TOPIC          MQTT topic for PIR motion events
#   AWS_ACCESS_KEY_ID     IAM key with iot:*, s3:PutObject
#   AWS_SECRET_ACCESS_KEY Matching secret
#   AWS_REGION            e.g. ap-south-1
#   AWS_ACCOUNT_ID        12-digit AWS account number (used to build Thing ARN)
#   S3_BUCKET             S3 bucket name for firmware storage
#   IOT_STREAM_ROLE_ARN   IAM role ARN that allows IoT to read from the S3 bucket

name: Firmware Release

on:
  push:
    tags:
      - 'release/*'
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # BUILD — compile both slot variants, compute CRC
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest

    outputs:
      version:      ${{ steps.version.outputs.version }}
      slot_a_size:  ${{ steps.crc.outputs.slot_a_size }}
      slot_a_crc:   ${{ steps.crc.outputs.slot_a_crc }}
      slot_b_size:  ${{ steps.crc.outputs.slot_b_size }}
      slot_b_crc:   ${{ steps.crc.outputs.slot_b_crc }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version string
        id: version
        run: |
          # Use the tag name on a tag push, or the short commit SHA otherwise.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # arm-none-eabi-gcc 13.x is available in the Ubuntu 24.04 runner repos.
      # This matches the toolchain version CubeIDE uses (GNU Tools for STM32 13.3.rel1).
      - name: Install ARM toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi

      # application_config.h is gitignored (contains credentials).
      # Recreate it from secrets so the build has what it needs.
      - name: Generate application_config.h
        env:
          WIFI_SSID:     ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
          MQTT_BROKER:   ${{ secrets.MQTT_BROKER }}
          CLIENT_ID:     ${{ secrets.CLIENT_ID }}
          UTC_OFFSET:    ${{ secrets.UTC_OFFSET }}
          MOTION_TOPIC:  ${{ secrets.MOTION_TOPIC }}
        run: |
          python3 - <<'PYEOF'
          import os, textwrap

          content = textwrap.dedent(f"""
          /*
           * application_config.h — generated by CI from GitHub Secrets.
           * DO NOT commit this file.
           */
          #ifndef INC_APPLICATION_CONFIG_H_
          #define INC_APPLICATION_CONFIG_H_

          #include "logging_levels.h"

          #ifndef LIBRARY_LOG_NAME
              #define LIBRARY_LOG_NAME    "MAIN_APP"
          #endif
          #ifndef LIBRARY_LOG_LEVEL
              #define LIBRARY_LOG_LEVEL   LOG_INFO
          #endif

          #include "logging_stack.h"

          #define WIFI_SSID       "{os.environ['WIFI_SSID']}"
          #define WIFI_PASSWORD   "{os.environ['WIFI_PASSWORD']}"
          #define MQTT_BROKER     "{os.environ['MQTT_BROKER']}"
          #define MQTT_PORT       8883
          #define CLIENT_ID       "{os.environ['CLIENT_ID']}"
          #define UTC_OFFSET      {os.environ['UTC_OFFSET']}
          #define MOTION_TOPIC    "{os.environ['MOTION_TOPIC']}"

          #define MQTT_PUBLISH_TIME_BETWEEN_MS    ( 10000U )
          #define MAX_MQTT_PAYLOAD_SIZE           512
          #define MAX_MQTT_TOPIC_SIZE             80

          #define USER_FLASH_FIRST_SECTOR_ADDRESS     0x08020000
          #define USER_FLASH_SECOND_SECTOR_ADDRESS    0x08040000
          #define USER_FLASH_LAST_SECTOR_ADDRESS      0x081C0000
          #define USER_FLASH_END_ADDRESS              0x081FFFFF

          #endif /* INC_APPLICATION_CONFIG_H_ */
          """).lstrip()

          with open("app/IOT_SDK/config/application_config.h", "w") as f:
              f.write(content)
          PYEOF

      # app/Makefile is a hand-crafted portable Makefile (not the CubeIDE-generated
      # one in app/Debug/).  SLOT=A/B sets FLASH ORIGIN and VECT_TAB_OFFSET without
      # patching any source files.  Outputs go to app/build/slot{A,B}/app.bin.
      - name: Build slot A
        run: make -C app SLOT=A -j"$(nproc)"

      - name: Build slot B
        run: make -C app SLOT=B -j"$(nproc)"

      - name: Compute CRC and file sizes
        id: crc
        run: |
          SLOT_A_CRC=$(python3 scripts/ota/compute_crc32.py --decimal app/build/slotA/app.bin)
          SLOT_B_CRC=$(python3 scripts/ota/compute_crc32.py --decimal app/build/slotB/app.bin)
          SLOT_A_SIZE=$(wc -c < app/build/slotA/app.bin | tr -d ' ')
          SLOT_B_SIZE=$(wc -c < app/build/slotB/app.bin | tr -d ' ')

          echo "slot_a_crc=${SLOT_A_CRC}"   >> "$GITHUB_OUTPUT"
          echo "slot_a_size=${SLOT_A_SIZE}"  >> "$GITHUB_OUTPUT"
          echo "slot_b_crc=${SLOT_B_CRC}"   >> "$GITHUB_OUTPUT"
          echo "slot_b_size=${SLOT_B_SIZE}"  >> "$GITHUB_OUTPUT"

          echo "Slot A — size: ${SLOT_A_SIZE} B, CRC: ${SLOT_A_CRC}"
          echo "Slot B — size: ${SLOT_B_SIZE} B, CRC: ${SLOT_B_CRC}"

      - name: Stage firmware binaries
        run: |
          mkdir -p staging
          cp app/build/slotA/app.bin staging/slotA.bin
          cp app/build/slotB/app.bin staging/slotB.bin

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.version }}
          path: staging/

  # ---------------------------------------------------------------------------
  # DEPLOY — pick inactive slot, upload to S3, create Stream + Job
  # ---------------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ needs.build.outputs.version }}
          path: firmware/

      - name: List downloaded artifacts
        run: ls -lh firmware/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # The device reports its active slot in the Thing Shadow after a
      # confirmed boot.  Deploy to the opposite slot so the device always
      # switches slots on each update.
      - name: Query Thing Shadow for active slot
        id: shadow
        env:
          THING_NAME: ${{ secrets.CLIENT_ID }}
        run: |
          # AWS CLI v2 requires get-thing-shadow to write to a file.
          # Write to a temp file then read it back.
          # If the shadow doesn't exist yet (device hasn't booted and reported),
          # default to slot A so the first OTA targets slot B.
          if aws iot-data get-thing-shadow \
               --thing-name "$THING_NAME" \
               /tmp/shadow.json 2>/dev/null; then
            ACTIVE=$(python3 -c "
          import json
          d = json.load(open('/tmp/shadow.json'))
          print(d['state']['reported'].get('active_slot', 'A'))
            ")
          else
            echo "No Thing Shadow found — defaulting active slot to A"
            ACTIVE="A"
          fi

          echo "active_slot=${ACTIVE}" >> "$GITHUB_OUTPUT"

          if [ "$ACTIVE" = "A" ]; then
            echo "target_slot=B" >> "$GITHUB_OUTPUT"
          else
            echo "target_slot=A" >> "$GITHUB_OUTPUT"
          fi

          echo "Active slot: ${ACTIVE} — deploying to opposite slot"

      - name: Select binary, size, and CRC for target slot
        id: select
        env:
          TARGET: ${{ steps.shadow.outputs.target_slot }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if [ "$TARGET" = "A" ]; then
            BIN="firmware/slotA.bin"
            SIZE="${{ needs.build.outputs.slot_a_size }}"
            CRC="${{ needs.build.outputs.slot_a_crc }}"
          else
            BIN="firmware/slotB.bin"
            SIZE="${{ needs.build.outputs.slot_b_size }}"
            CRC="${{ needs.build.outputs.slot_b_crc }}"
          fi

          S3_KEY="firmware/${VERSION}/slot${TARGET}.bin"

          echo "bin=${BIN}"       >> "$GITHUB_OUTPUT"
          echo "size=${SIZE}"     >> "$GITHUB_OUTPUT"
          echo "crc=${CRC}"       >> "$GITHUB_OUTPUT"
          echo "s3_key=${S3_KEY}" >> "$GITHUB_OUTPUT"

          echo "Deploying slot ${TARGET}: ${BIN} (${SIZE} B, CRC ${CRC}) → s3://${{ secrets.S3_BUCKET }}/${S3_KEY}"

      - name: Upload firmware binary to S3
        run: |
          aws s3 cp \
            "${{ steps.select.outputs.bin }}" \
            "s3://${{ secrets.S3_BUCKET }}/${{ steps.select.outputs.s3_key }}"

      # IoT Streams cannot be updated in place — delete and recreate.
      - name: Create IoT Stream
        env:
          IOT_STREAM_NAME: desk-occupancy-ota-stream
        run: |
          aws iot delete-stream --stream-id "$IOT_STREAM_NAME" 2>/dev/null || true

          aws iot create-stream \
            --stream-id "$IOT_STREAM_NAME" \
            --files "[{
              \"fileId\": 0,
              \"s3Location\": {
                \"bucket\": \"${{ secrets.S3_BUCKET }}\",
                \"key\":    \"${{ steps.select.outputs.s3_key }}\"
              }
            }]" \
            --role-arn "${{ secrets.IOT_STREAM_ROLE_ARN }}"

      - name: Generate job document
        env:
          IOT_STREAM_NAME: desk-occupancy-ota-stream
        run: |
          python3 scripts/ota/generate_job_doc.py \
            --stream-id      "$IOT_STREAM_NAME" \
            --file-size      "${{ steps.select.outputs.size }}" \
            --file-checksum  "${{ steps.select.outputs.crc }}" \
            > job_document.json

          echo "Job document:"
          cat job_document.json

      - name: Create IoT Job
        env:
          THING_NAME:  ${{ secrets.CLIENT_ID }}
          ACCOUNT_ID:  ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION:  ${{ secrets.AWS_REGION }}
          VERSION:     ${{ needs.build.outputs.version }}
        run: |
          # Job IDs must be unique — include version and a timestamp.
          JOB_ID="ota-${VERSION}-$(date +%s)"
          THING_ARN="arn:aws:iot:${AWS_REGION}:${ACCOUNT_ID}:thing/${THING_NAME}"

          aws iot create-job \
            --job-id           "$JOB_ID" \
            --targets          "$THING_ARN" \
            --document         file://job_document.json \
            --target-selection SNAPSHOT

          echo "Created IoT Job: ${JOB_ID}"
